title: Medlemskap
'@extends':
  type: default
  context: 'blueprints://pages'

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          type: tab
          title: Innehåll
          fields:
            header.subtitle:
              type: text
              label: Underrubrik
              help: Visas under sidrubriken

            header.swish_qr:
              type: filepicker
              label: Swish QR-kod (medlemsavgift)
              preview_images: true
              folder: 'theme://images/content'
              accept:
                - image/*

            header.donation_qr:
              type: filepicker
              label: Swish QR-kod (donation)
              preview_images: true
              folder: 'theme://images/content'
              accept:
                - image/*
